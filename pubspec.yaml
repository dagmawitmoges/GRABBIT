name: grabbit
description: Grabbit - Discounted Deals Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP Client
  dio: ^5.4.3+1
  
  
  # Secure Token Storage
# Secure Token Storage
  flutter_secure_storage: ^9.0.0
  # Navigation
  go_router: ^13.2.0

  # Environment config
  flutter_dotenv: ^5.1.0

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.development
    - .env.production