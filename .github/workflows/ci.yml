name: Grabbit CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: latest

      - name: Create env files
        run: |
          echo "BASE_URL=http://localhost:3000" > .env.development
          echo "ENV=development" >> .env.development
          echo "BASE_URL=https://grabbit-1.onrender.com" > .env.production
          echo "ENV=production" >> .env.production

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: latest

      - name: Create env files
        run: |
          echo "BASE_URL=${{ secrets.PROD_BASE_URL }}" > .env.production
          echo "ENV=production" >> .env.production
          echo "BASE_URL=http://localhost:3000" > .env.development
          echo "ENV=development" >> .env.development

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: grabbit-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14